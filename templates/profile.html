{% extends "base.html" %}
{% block title %}Profile – CertVault{% endblock %}
{% block content %}
<div class="container">
    <div class="form-page animate-fade-up">
        <div class="form-header">
            <h1><i class="fas fa-user-gear"></i> Profile Settings</h1>
            <p>Manage your account details</p>
        </div>
        <form method="POST" class="cert-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ current_user.name }}">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" disabled value="{{ current_user.email }}">
            </div>
            <hr>
            <h3>Change Password</h3>
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password"
                    placeholder="Leave blank to keep current">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Min 6 characters"
                    minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
