{% extends "base.html" %}
{% block title %}Register – CertVault{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card animate-fade-up">
        <div class="auth-header">
            <i class="fas fa-shield-halved auth-logo"></i>
            <h1>Create Account</h1>
            <p>Start managing your certificates securely</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Min 6 characters"
                    minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                    placeholder="Repeat password">
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Create
                Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
