{% extends "base.html" %}
{% block title %}Login – CertVault{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card animate-fade-up">
        <div class="auth-header">
            <i class="fas fa-shield-halved auth-logo"></i>
            <h1>Welcome Back</h1>
            <p>Sign in to your CertVault account</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            <div class="form-check">
                <label><input type="checkbox" name="remember" value="1"> Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
